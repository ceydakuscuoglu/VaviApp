name: vavi_app
description: Voice Assistant for Visually Impaired - Indoor Navigation App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  tflite_flutter: 0.11.0
  camera: ^0.10.6
  image: ^4.5.2
  audioplayers: ^6.0.0
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/data/
    - assets/models/
    - assets/sounds/
    - assets/vectors/


name: vavi_app
description: Voice Assistant for Visually Impaired - Indoor Navigation App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.10.5+9
  google_generative_ai: ^0.4.0
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.3.0
  image: ^4.1.3
  speech_to_text: ^7.0.0
  string_similarity: ^2.0.0
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.7
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/data/

